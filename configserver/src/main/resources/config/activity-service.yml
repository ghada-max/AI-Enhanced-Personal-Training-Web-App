server:
  port: 3347
spring:
  data:
    url: mongodb://localhost:27017/fittnessApp
    database: activities
  rabbitmq:
    host:  localhost
    port:  5672
    username: guest
    password: guest

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name:  activities.queue
  routing:
    key: activity.tracking


